name: Release packages

on:
  workflow_dispatch:
    inputs:
      force_github_packages:
        description: 'Force publish all packages to GitHub Packages (skips changesets check)'
        type: boolean
        default: false
      skip_changesets:
        description: 'Skip the changesets step (create PR / publish to NPM)'
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "packages/*/CHANGELOG.md"
      - ".changeset/*"

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
    NPM_CONFIG_PROVENANCE: true
    TURBO_TELEMETRY_DISABLED: 1
    DO_NOT_TRACK: 1

jobs:
  release:
    if: github.repository == 'padosoft/ts-support'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-setup

      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        if: inputs.skip_changesets != true
        uses: changesets/action@v1
        with:
          version: bun version-packages
          publish: bun publish-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true' || inputs.force_github_packages == true
        env:
          NPM_CONFIG_PROVENANCE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> .npmrc
          if [ "${{ inputs.force_github_packages }}" = "true" ]; then
            echo "Force mode: publishing all packages to GitHub Packages"
            for dir in packages/*/; do
              if [ -f "${dir}package.json" ]; then
                pkg_name=$(jq -r '.name' "${dir}package.json")
                echo "Publishing $pkg_name from $dir to GitHub Packages"
                npm publish "$dir" --registry https://npm.pkg.github.com/ --access public
              fi
            done
          else
            published='${{ steps.changesets.outputs.publishedPackages }}'
            echo "$published" | jq -r '.[].name' | while IFS= read -r pkg_name; do
              for dir in packages/*/; do
                if [ -f "${dir}package.json" ]; then
                  name=$(jq -r '.name' "${dir}package.json")
                  if [ "$name" = "$pkg_name" ]; then
                    echo "Publishing $pkg_name from $dir to GitHub Packages"
                    npm publish "$dir" --registry https://npm.pkg.github.com/ --access public
                  fi
                fi
              done
            done
          fi

      - name: Publish release tags
        run: git push --follow-tags --set-upstream origin HEAD

name: 'CI setup'
description: "ci tools setup"
runs:
  using: 'composite'
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'

    - name: Install Dependencies
      run: bun ci --ignore-scripts
      shell: bash